<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coworker</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #14171e;
            --bg-secondary: #1c2029;
            --accent: #00b4d8;
            --text: #e0e0e0;
            --text-muted: #8892a4;
            --border: #2a2f3a;
            --user-bg: #1a3a4a;
            --assistant-bg: #1e2530;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        header .status {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        header .status .dot.healthy { background: #4caf50; }
        header .status .dot.unhealthy { background: #f44336; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid var(--accent);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border: 1px solid var(--border);
        }

        .message.assistant table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
        .message.assistant th, .message.assistant td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
        .message.assistant th { background: var(--bg); }
        .message.assistant code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        .message.assistant pre { background: var(--bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .message.assistant pre code { padding: 0; }

        .thinking {
            align-self: flex-start;
            padding: 12px 16px;
            color: var(--text-muted);
            font-style: italic;
            display: none;
        }

        .thinking.visible { display: flex; gap: 4px; align-items: center; }
        .thinking .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
        .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            gap: 12px;
        }

        .input-area textarea {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
        }

        .input-area textarea:focus { border-color: var(--accent); }

        .input-area button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover { opacity: 0.85; }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>AI Coworker</h1>
        <div class="status">
            <span class="dot" id="healthDot"></span>
            <span id="healthText">Checking...</span>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <p>Hello! I'm your AI Coworker. I can help you view, create, update, and delete records. What would you like to do?</p>
        </div>
    </div>

    <div class="thinking" id="thinking">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span>Thinking...</span>
    </div>

    <div class="input-area">
        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinking = document.getElementById('thinking');
        let history = [];

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });

        // Send on Enter (Shift+Enter for newline)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            thinking.classList.add('visible');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history }),
                    signal: AbortSignal.timeout(180000),
                });

                const data = await response.json();
                if (data.error) {
                    addMessage('assistant', `Error: ${data.error}`);
                } else {
                    addMessage('assistant', data.response);
                    history.push({ role: 'assistant', content: data.response });
                }
            } catch (err) {
                addMessage('assistant', `Error: ${err.message}`);
            } finally {
                thinking.classList.remove('visible');
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = role === 'assistant' ? marked.parse(content) : escapeHtml(content);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Health check polling
        async function checkHealth() {
            const dot = document.getElementById('healthDot');
            const text = document.getElementById('healthText');
            try {
                const r = await fetch('/health', { signal: AbortSignal.timeout(5000) });
                if (r.ok) {
                    dot.className = 'dot healthy';
                    text.textContent = 'Connected';
                } else {
                    dot.className = 'dot unhealthy';
                    text.textContent = 'Unhealthy';
                }
            } catch {
                dot.className = 'dot unhealthy';
                text.textContent = 'Disconnected';
            }
        }

        checkHealth();
        setInterval(checkHealth, 15000);
    </script>
</body>
</html>
